backend:
  name: github
  repo: zayatMark/forms-of-love-site
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "episodes"
    label: "Episodes"
    folder: "src/content/episodes"
    create: true
    slug: "{{year}}-{{month}}-{{day}}"
    fields:
      - { label: "Episode Number", name: "episode", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Audio URL", name: "audio", widget: "string" }
      - { label: "Duration", name: "duration", widget: "string", default: "60 minutes" }

      - label: "Genre Tags"
        name: "tags"
        widget: "select"
        multiple: true
        options:
          - ambient
          - experimental
          - dub
          - electronic
          - field recordings
          - spoken word
          - sound collage
          - jazz
          - folk
          - leftfield

      - label: "Tracklist"
        name: "tracklist"
        widget: "list"
        required: false
        fields:
          - { label: "Timestamp", name: "timestamp", widget: "string", required: false }
          - { label: "Artist", name: "artist", widget: "string" }
          - { label: "Track", name: "track", widget: "string" }
          - { label: "Release", name: "release", widget: "string", required: false }
          - { label: "Label", name: "label", widget: "string", required: false }

      - { label: "Notes", name: "body", widget: "markdown", required: false }